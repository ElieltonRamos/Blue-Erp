worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    gzip on;

    server {
        listen       4200;
        server_name  localhost;

        root   "C:/Program Files/Blue Erp/nginx/html/frontend";
        index  index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}