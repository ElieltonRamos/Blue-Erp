<div class="flex space-x-2 items-center text-sm text-text-primary">
  <button
    class="px-3 py-1 bg-surface-alt border border-border rounded hover:bg-overlay disabled:opacity-50 transition-colors"
    [disabled]="page === 1"
    (click)="changePage(page - 1)"
  >
    Anterior
  </button>

  <span class="font-medium"> Página {{ page }} de {{ totalPages }} </span>

  <button
    class="px-3 py-1 bg-surface-alt border border-border rounded hover:bg-overlay transition-colors"
    (click)="changePage(page + 1)"
  >
    Próxima
  </button>
</div>
