<div class="min-h-screen flex items-center justify-center bg-base px-4">
  <button
    (click)="goToMenu()"
    class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-accent text-btn-text px-6 py-2 rounded shadow-md hover:bg-accent-hover transition cursor-pointer"
  >
    Voltar para menu
  </button>

  <div class="mt-20 w-full max-w-4xl bg-surface rounded-2xl shadow-lg p-6">
    <div class="flex items-center justify-between mb-6 border-b border-border pb-4">
      <div class="flex flex-wrap gap-4">
        <button
          (click)="changeMenuContext('create')"
          [attr.class]="menuContext === 'create' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-user-plus"></i> Novo Usuário
        </button>
        <button
          (click)="changeMenuContext('listUsers')"
          [attr.class]="menuContext === 'listUsers' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-users"></i> Usuários Cadastrados
        </button>
        <button
          (click)="changeMenuContext('manageLocations')"
          [attr.class]="menuContext === 'manageLocations' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-map-marker-alt"></i> Gerenciamento de Locais
        </button>
      </div>
    </div>

    @if (menuContext === 'create') {
      <app-create-user />
    }
    @if (menuContext === 'listUsers') {
      <app-list-users />
    }
    @if (menuContext === 'manageLocations') {
      <app-manage-production-locations />
    }
  </div>
</div>
