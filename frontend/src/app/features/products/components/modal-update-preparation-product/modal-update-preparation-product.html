<div
  class="fixed inset-0 flex items-center justify-center z-50 p-4"
  style="background-color: rgba(0, 0, 0, 0.85)"
>
  <div
    class="bg-linear-to-br from-[#1d2a3c] to-[#2a3f5f] rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto"
  >
    <!-- Header -->
    <div
      class="bg-linear-to-r from-[#0f1b2e] to-[#1a2942] text-white p-6 rounded-t-2xl sticky top-0 z-10"
    >
      <h2 class="text-2xl font-bold">Editar Modo de Preparo</h2>
      <p class="text-gray-300 text-sm mt-1">Produto #{{ product.id }} - {{ product.name }}</p>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4">
      <h3 class="text-lg font-semibold text-green-400 flex items-center gap-2">
        <span class="w-1 h-5 bg-green-400 rounded"></span>
        Passos de Preparo
      </h3>

      <!-- Lista de passos -->
      <div class="space-y-2">
        @for (step of preparationSteps; track $index) {
          <div class="flex items-start gap-4 p-4 bg-white/5 rounded-lg border border-white/10">
            <div
              class="flex items-center justify-center w-10 h-10 rounded-full bg-green-500/20 text-green-400 font-bold shrink-0"
            >
              {{ step.order }}
            </div>
            <div class="flex-1 text-gray-300">{{ step.description }}</div>
            <div class="flex gap-2 shrink-0">
              <button
                (click)="moveStepUp($index)"
                [disabled]="$index === 0"
                class="px-2 py-1 bg-blue-500/20 text-blue-400 rounded hover:bg-blue-500/30 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                title="Mover para cima"
              >
                ↑
              </button>
              <button
                (click)="moveStepDown($index)"
                [disabled]="$index === preparationSteps.length - 1"
                class="px-2 py-1 bg-blue-500/20 text-blue-400 rounded hover:bg-blue-500/30 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                title="Mover para baixo"
              >
                ↓
              </button>
              <button
                (click)="removePreparationStep($index)"
                class="px-3 py-1 bg-red-500/20 text-red-400 rounded hover:bg-red-500/30 transition-colors"
                title="Remover"
              >
                ✕
              </button>
            </div>
          </div>
        } @empty {
          <p class="text-gray-400 text-center py-8">Nenhum passo de preparo. Adicione abaixo.</p>
        }
      </div>

      <!-- Adicionar novo passo -->
      <div class="bg-white/5 p-4 rounded-lg border border-green-400/30">
        <h4 class="text-white font-semibold mb-4">Adicionar Passo</h4>
        <div class="flex gap-4">
          <textarea
            [(ngModel)]="newPreparationStep.description"
            [ngModelOptions]="{ standalone: true }"
            placeholder="Descreva o passo do preparo..."
            rows="3"
            class="flex-1 p-3 rounded-lg bg-white/95 text-gray-900 font-medium placeholder-gray-400 border-2 border-transparent focus:border-green-500 outline-none resize-none"
          ></textarea>
          <button
            (click)="addPreparationStep()"
            class="px-6 py-3 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold transition-colors self-start"
          >
            Adicionar
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div
      class="flex justify-end gap-3 p-6 border-t border-white/10 bg-black/20 rounded-b-2xl sticky bottom-0"
    >
      <button
        (click)="onCancel()"
        class="px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-lg font-semibold transition-colors duration-200"
      >
        Cancelar
      </button>
      <button
        (click)="onSave()"
        class="px-8 py-3 bg-linear-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white rounded-lg font-semibold shadow-lg hover:shadow-green-500/50 transition-all duration-200 transform hover:scale-105"
      >
        Salvar Modo de Preparo
      </button>
    </div>
  </div>
</div>
