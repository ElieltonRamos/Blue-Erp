<div class="min-h-screen flex flex-col items-center justify-start bg-base px-4 py-6">
  <!-- Botão -->
  <button
    (click)="goToMenu()"
    class="self-center mb-6 bg-accent hover:bg-accent-hover text-btn-text px-6 py-2 rounded-lg shadow-md transition-all"
  >
    Voltar para menu
  </button>

  <!-- Container -->
  <div
    class="w-full max-w-[95%] 2xl:max-w-400 bg-surface rounded-2xl shadow-2xl p-6 border border-border"
  >
    <!-- Header -->
    <div class="flex items-center justify-between mb-6 border-b border-border pb-4">
      <div class="flex flex-wrap gap-4">
        <button
          (click)="changeMenuContext('listProducts')"
          [attr.class]="menuContext === 'listProducts' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-box"></i>
          Produtos Cadastrados
        </button>

        <button
          (click)="changeMenuContext('create')"
          [attr.class]="menuContext === 'create' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-plus"></i>
          Novo Produto
        </button>

        <button
          (click)="changeMenuContext('listPrimaryMaterial')"
          [attr.class]="
            menuContext === 'listPrimaryMaterial' ? classBtnSelected : classBtnUnselected
          "
        >
          <i class="fas fa-layer-group"></i>
          Lista de Matérias Primas
        </button>

        <button
          (click)="changeMenuContext('createPrimaryMaterial')"
          [attr.class]="
            menuContext === 'createPrimaryMaterial' ? classBtnSelected : classBtnUnselected
          "
        >
          <i class="fas fa-plus-circle"></i>
          Nova Matéria Prima
        </button>

        <button
          (click)="changeMenuContext('category')"
          [attr.class]="menuContext === 'category' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-tags"></i>
          Categorias
        </button>
      </div>
    </div>

    <!-- Conteúdo -->
    @if (menuContext === 'create') {
      <app-create-product />
    } @else if (menuContext === 'listProducts') {
      <app-list-products />
    } @else if (menuContext === 'createPrimaryMaterial') {
      <app-create-primary-material />
    } @else if (menuContext === 'listPrimaryMaterial') {
      <app-list-primary-material />
    } @else if (menuContext === 'category') {
      <app-category />
    }
  </div>
</div>
