<div
  class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50"
  [class.hidden]="!show"
>
  <div
    class="bg-slate-800 rounded-lg shadow-2xl border border-slate-700 max-w-3xl w-full max-h-[90vh] overflow-hidden flex flex-col"
  >
    <!-- Header -->
    <div class="flex justify-between items-center p-6 border-b border-slate-700">
      <div>
        <h3 class="text-xl font-bold text-white">Mesa {{ table.number }} - Produtos</h3>
        <p class="text-slate-400 text-sm">{{ table.customer }}</p>
      </div>
      <button (click)="close.emit()" class="p-1 hover:bg-slate-700 rounded transition-colors">
        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 overflow-y-auto flex-1">
      <!-- Add Product -->
      <div class="mb-6">
        <label class="block text-slate-300 text-sm font-medium mb-2">Adicionar Produto</label>
        <select
          #productSelect
          (change)="onProductSelect(productSelect.value)"
          class="w-full bg-slate-700 border border-slate-600 rounded-md px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500"
        >
          <option value="">Selecione um produto...</option>
          @for (product of products; track product.id) {
            <option [value]="product.id">
              {{ product.name }} - R$ {{ product.price.toFixed(2) }}
            </option>
          }
        </select>
      </div>

      <!-- Products List -->
      <div class="space-y-3">
        @if (!table.products?.length) {
          <div class="text-center py-8 text-slate-400">Nenhum produto adicionado ainda</div>
        }
        @for (item of table.products; track item.id) {
          <div class="bg-slate-700/50 rounded-lg p-4 border border-slate-600/50">
            <div class="flex justify-between items-start mb-2">
              <div class="flex-1">
                <h4 class="text-white font-medium">{{ item.productName }}</h4>
                <p class="text-slate-400 text-sm">R$ {{ item.unitPrice.toFixed(2) }} / unidade</p>
              </div>
              <button
                (click)="remove.emit(item.id!)"
                class="p-1 hover:bg-rose-600 rounded transition-colors"
              >
                <svg
                  class="w-4 h-4 text-rose-400"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                  />
                </svg>
              </button>
            </div>
            <div class="flex justify-between items-center">
              <div class="flex items-center gap-2">
                <button
                  (click)="update.emit({ id: item.id!, change: -1 })"
                  class="p-1 bg-slate-600 hover:bg-slate-500 rounded transition-colors"
                >
                  <svg
                    class="w-4 h-4 text-white"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M20 12H4"
                    />
                  </svg>
                </button>
                <span class="text-white font-medium w-12 text-center">{{ item.quantity }}</span>
                <button
                  (click)="update.emit({ id: item.id!, change: 1 })"
                  class="p-1 bg-slate-600 hover:bg-slate-500 rounded transition-colors"
                >
                  <svg
                    class="w-4 h-4 text-white"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 4v16m8-8H4"
                    />
                  </svg>
                </button>
              </div>
              <div class="text-white font-bold">R$ {{ item.totalPrice.toFixed(2) }}</div>
            </div>
          </div>
        }
      </div>
    </div>

    <!-- Footer -->
    <div class="p-6 border-t border-slate-700">
      <button
        (click)="close.emit()"
        class="w-full px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-md text-sm font-medium transition-colors"
      >
        Fechar
      </button>
    </div>
  </div>
</div>
