<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
  <div class="bg-surface rounded-lg p-4 border border-border-subtle shadow-sm">
    <div class="text-text-secondary text-sm mb-1">Total de Mesas</div>
    <div class="text-3xl font-bold text-text-primary">{{ total }}</div>
  </div>

  <div class="bg-success/10 rounded-lg p-4 border border-success/30 shadow-sm">
    <div class="text-success text-sm mb-1">Disponíveis</div>
    <div class="text-3xl font-bold text-success">{{ available }}</div>
  </div>

  <div class="bg-danger/10 rounded-lg p-4 border border-danger/30 shadow-sm">
    <div class="text-danger text-sm mb-1">Ocupadas</div>
    <div class="text-3xl font-bold text-danger">{{ occupied }}</div>
  </div>
</div>
