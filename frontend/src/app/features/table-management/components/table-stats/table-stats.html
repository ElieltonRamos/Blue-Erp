<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
  <!-- Total de Mesas -->
  <div class="bg-slate-700/50 rounded-lg p-4 border border-slate-600/50">
    <div class="text-slate-400 text-sm mb-1">Total de Mesas</div>
    <div class="text-3xl font-bold text-white">{{ total }}</div>
  </div>

  <!-- Disponíveis -->
  <div class="bg-emerald-900/30 rounded-lg p-4 border border-emerald-700/50">
    <div class="text-emerald-400 text-sm mb-1">Disponíveis</div>
    <div class="text-3xl font-bold text-emerald-400">{{ available }}</div>
  </div>

  <!-- Ocupadas -->
  <div class="bg-rose-900/30 rounded-lg p-4 border border-rose-700/50">
    <div class="text-rose-400 text-sm mb-1">Ocupadas</div>
    <div class="text-3xl font-bold text-rose-400">{{ occupied }}</div>
  </div>
</div>
