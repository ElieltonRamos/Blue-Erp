<!-- Modal Overlay -->
<div
  *ngIf="isOpen"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"
  (click)="closeModal()"
>
  <!-- Modal Content -->
  <div
    class="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden"
    (click)="$event.stopPropagation()"
  >
    <!-- Modal Header -->
    <div
      class="bg-linear-to-r from-indigo-600 to-purple-600 px-6 py-4 flex justify-between items-center"
    >
      <div>
        <h2 class="text-2xl font-bold text-white">Editar Pedido</h2>
        <p class="text-indigo-200 text-sm mt-1">{{ order?.id }}</p>
      </div>
      <button
        (click)="closeModal()"
        class="text-white hover:bg-white/20 rounded-lg p-2 transition-colors"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="p-6 overflow-y-auto max-h-[calc(90vh-200px)]">
      <form *ngIf="order" #orderForm="ngForm">
        <!-- Customer Name -->
        <div class="mb-6">
          <label class="text-slate-300 text-sm font-medium mb-2 block">Nome do Cliente</label>
          <input
            type="text"
            [(ngModel)]="order.customerName"
            name="customerName"
            required
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors"
            placeholder="Digite o nome do cliente"
          />
        </div>

        <!-- Order Type and Table -->
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div>
            <label class="text-slate-300 text-sm font-medium mb-2 block">Tipo de Pedido</label>
            <select
              [(ngModel)]="order.type"
              name="type"
              (change)="onTypeChange()"
              class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-slate-200 focus:outline-none focus:border-indigo-500 transition-colors"
            >
              <option value="dine_in">🪑 Comer no Local</option>
              <option value="delivery">🚚 Delivery</option>
            </select>
          </div>

          <div *ngIf="order.type === 'dine_in'">
            <label class="text-slate-300 text-sm font-medium mb-2 block">Mesa</label>
            <input
              type="text"
              [(ngModel)]="order.table"
              name="table"
              class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors"
              placeholder="Ex: Mesa 5"
            />
          </div>
        </div>

        <!-- Items -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-3">
            <label class="text-slate-300 text-sm font-medium">Itens do Pedido</label>
            <button
              type="button"
              (click)="addItem()"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-2"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Adicionar Item
            </button>
          </div>

          <div class="space-y-3">
            <div
              *ngFor="let item of order.items; let i = index"
              class="bg-slate-700/50 rounded-lg p-4 border border-slate-600"
            >
              <div class="grid grid-cols-12 gap-3">
                <div class="col-span-5">
                  <label class="text-slate-400 text-xs mb-1 block">Nome</label>
                  <input
                    type="text"
                    [(ngModel)]="item.name"
                    [name]="'itemName' + i"
                    (ngModelChange)="calculateItemTotal(item)"
                    class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500"
                    placeholder="Nome do item"
                  />
                </div>

                <div class="col-span-2">
                  <label class="text-slate-400 text-xs mb-1 block">Qtd</label>
                  <input
                    type="number"
                    [(ngModel)]="item.quantity"
                    [name]="'itemQty' + i"
                    (ngModelChange)="calculateItemTotal(item)"
                    min="1"
                    class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500"
                  />
                </div>

                <div class="col-span-2">
                  <label class="text-slate-400 text-xs mb-1 block">Preço</label>
                  <input
                    type="number"
                    [(ngModel)]="item.unitPrice"
                    [name]="'itemPrice' + i"
                    (ngModelChange)="calculateItemTotal(item)"
                    step="0.01"
                    min="0"
                    class="w-full bg-slate-800 border border-slate-600 rounded px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-indigo-500"
                  />
                </div>

                <div class="col-span-2">
                  <label class="text-slate-400 text-xs mb-1 block">Total</label>
                  <div
                    class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-green-400 font-medium text-sm"
                  >
                    R$ {{ item.total.toFixed(2) }}
                  </div>
                </div>

                <div class="col-span-1 flex items-end">
                  <button
                    type="button"
                    (click)="removeItem(i)"
                    class="w-full bg-red-600 hover:bg-red-700 text-white p-2 rounded transition-colors"
                    title="Remover item"
                  >
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <line x1="18" y1="6" x2="6" y2="18"></line>
                      <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Order Total -->
        <div
          class="bg-linear-to-r from-green-600/20 to-emerald-600/20 border border-green-500/30 rounded-lg p-4"
        >
          <div class="flex justify-between items-center">
            <span class="text-slate-300 text-lg font-medium">Total do Pedido:</span>
            <span class="text-green-400 text-2xl font-bold">R$ {{ order.total.toFixed(2) }}</span>
          </div>
        </div>
      </form>
    </div>

    <!-- Modal Footer -->
    <div class="bg-slate-900 px-6 py-4 flex justify-end gap-3">
      <button
        (click)="closeModal()"
        class="px-6 py-2.5 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg font-medium transition-colors"
      >
        Cancelar
      </button>
      <button
        (click)="saveOrder()"
        [disabled]="isSaving"
        class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
      >
        <svg
          *ngIf="isSaving"
          class="animate-spin"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
        </svg>
        {{ isSaving ? 'Salvando...' : 'Salvar Alterações' }}
      </button>
    </div>
  </div>
</div>
