<ng-template cdkPortal>
  <div
    class="bg-surface rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden border border-border"
    (click)="onModalClick($event)"
  >
    <!-- Header -->
    <div class="bg-accent px-6 py-4 flex justify-between items-center border-b border-border">
      <div>
        <h2 class="text-2xl font-bold text-btn-text">Editar Pedido</h2>

        <p class="text-text-secondary text-sm mt-1">#{{ order?.id }}</p>
      </div>

      <button
        (click)="closeModal()"
        class="text-btn-text hover:bg-overlay rounded-lg p-2 transition-all"
        aria-label="Fechar modal"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 overflow-y-auto max-h-[calc(90vh-200px)]">
      <form *ngIf="order" #orderForm="ngForm">
        <!-- Top -->
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div>
            <label class="text-text-primary text-sm font-medium mb-2 block">
              Nome do Cliente
            </label>

            <input
              type="text"
              [(ngModel)]="order.customerName"
              name="customerName"
              required
              class="w-full bg-overlay border border-border rounded-lg px-4 py-3 text-text-primary placeholder:text-text-muted focus:outline-none focus:border-accent transition-all"
              placeholder="Digite o nome do cliente"
            />
          </div>

          <div>
            <label class="text-text-primary text-sm font-medium mb-2 block"> Tipo de Pedido </label>

            <select
              [(ngModel)]="order.type"
              name="type"
              (change)="onTypeChange()"
              class="w-full bg-overlay border border-border rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-accent transition-all"
            >
              <option value="DINE_IN">Mesa</option>
              <option value="DELIVERY">Delivery</option>
            </select>
          </div>

          <div>
            <label class="text-text-primary text-sm font-medium mb-2 block"> Status </label>

            <select
              [(ngModel)]="order.status"
              name="status"
              class="w-full bg-overlay border border-border rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-accent transition-all"
            >
              <option value="OPEN">Aberto</option>
              <option value="CLOSED">Fechado</option>
            </select>
          </div>
        </div>

        <!-- Mesa -->
        <div class="mb-6" *ngIf="order.type === 'DINE_IN'">
          <label class="text-text-primary text-sm font-medium mb-2 block"> Mesa </label>

          <input
            type="text"
            [(ngModel)]="order.table"
            name="table"
            class="w-full bg-overlay border border-border rounded-lg px-4 py-3 text-text-primary placeholder:text-text-muted focus:outline-none focus:border-accent transition-all"
            placeholder="Ex: Mesa 5"
          />
        </div>

        <!-- Endereço -->
        <div class="mb-6" *ngIf="order.type === 'DELIVERY'">
          <label class="text-text-primary text-sm font-medium mb-2 block">
            Endereço de Entrega
          </label>

          <input
            type="text"
            [(ngModel)]="order.address"
            name="address"
            class="w-full bg-overlay border border-border rounded-lg px-4 py-3 text-text-primary placeholder:text-text-muted focus:outline-none focus:border-accent transition-all"
            placeholder="Endereço completo"
          />
        </div>

        <!-- Buscar -->
        <div class="mb-6">
          <label class="text-text-primary text-sm font-medium mb-3 block"> Buscar Produto </label>

          <div class="grid grid-cols-12 gap-3">
            <div class="col-span-4">
              <input
                type="text"
                [(ngModel)]="searchCode"
                [ngModelOptions]="{ standalone: true }"
                (keyup.enter)="searchProduct()"
                [disabled]="isSearchingProduct"
                placeholder="Código de barras"
                class="w-full bg-overlay border border-border rounded-lg px-3 py-2 text-text-primary text-sm focus:outline-none focus:border-accent disabled:opacity-50"
              />
            </div>

            <div class="col-span-6">
              <input
                type="text"
                [(ngModel)]="searchName"
                [ngModelOptions]="{ standalone: true }"
                (keyup.enter)="searchProduct()"
                [disabled]="isSearchingProduct"
                placeholder="Nome do produto"
                class="w-full bg-overlay border border-border rounded-lg px-3 py-2 text-text-primary text-sm focus:outline-none focus:border-accent disabled:opacity-50"
              />
            </div>

            <div class="col-span-2">
              <button
                type="button"
                (click)="searchProduct()"
                [disabled]="isSearchingProduct || (!searchCode && !searchName)"
                class="w-full bg-success hover:opacity-90 text-btn-text py-2 rounded-lg text-sm font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-1"
              >
                <svg
                  *ngIf="isSearchingProduct"
                  class="animate-spin"
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                </svg>

                {{ isSearchingProduct ? '...' : 'Buscar' }}
              </button>
            </div>
          </div>

          <!-- Produtos encontrados -->
          <div *ngIf="searchResults.length > 0" class="mt-3">
            <label class="text-text-primary text-sm mb-2 block"> Selecione o produto: </label>

            <select
              (change)="selectProduct($event)"
              class="w-full bg-overlay border border-border rounded-lg px-3 py-2 text-text-primary text-sm focus:outline-none focus:border-accent"
            >
              <option value="">-- Escolha um produto --</option>

              <option *ngFor="let product of searchResults; let i = index" [value]="i">
                {{ product.code }} - {{ product.name }} - R$
                {{ product.price.toFixed(2) }}
              </option>
            </select>
          </div>
        </div>

        <!-- Itens -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-3">
            <label class="text-text-primary text-sm font-medium"> Itens do Pedido </label>
          </div>

          <div class="space-y-2">
            <div
              *ngFor="let item of order.items; let i = index"
              class="bg-surface-alt rounded-lg px-3 py-2 border border-border"
            >
              <div class="flex items-center gap-2">
                <div class="w-24 shrink-0">
                  <label class="text-text-secondary text-xs mb-1 block"> Código </label>

                  <div
                    class="bg-overlay border border-border rounded px-2 py-1.5 text-text-secondary text-xs truncate"
                  >
                    {{ item.code }}
                  </div>
                </div>

                <div class="w-40 shrink-0">
                  <label class="text-text-secondary text-xs mb-1 block"> Produto </label>

                  <div
                    class="bg-overlay border border-border rounded px-2 py-1.5 text-text-primary text-xs truncate"
                    [title]="item.name"
                  >
                    {{ item.name }}
                  </div>
                </div>

                <div class="flex-1 min-w-0">
                  <label class="text-text-secondary text-xs mb-1 block"> Observação </label>

                  <input
                    type="text"
                    [value]="item.observation ?? ''"
                    (blur)="item.observation = $any($event.target).value"
                    placeholder="Obrigatório"
                    class="w-full bg-overlay border rounded px-2 py-1.5 text-text-primary text-xs focus:outline-none focus:border-accent"
                    [class.border-red-500]="!item.observation || item.observation.trim().length < 2"
                    [class.border-border]="item.observation && item.observation.trim().length >= 2"
                  />
                </div>

                <div class="w-14 shrink-0">
                  <label class="text-text-secondary text-xs mb-1 block"> Qtd </label>

                  <input
                    type="number"
                    [value]="item.quantity"
                    (change)="updateQuantity(item, +$any($event.target).value)"
                    min="1"
                    class="w-full bg-overlay border border-border rounded px-1 py-1.5 text-info text-xs text-center focus:outline-none focus:border-accent"
                  />
                </div>

                <div class="w-20 shrink-0">
                  <label class="text-text-secondary text-xs mb-1 block"> Preço Un. </label>

                  <div
                    class="bg-overlay border border-border rounded px-2 py-1.5 text-text-secondary text-xs text-center"
                  >
                    R$ {{ item.unitPrice.toFixed(2) }}
                  </div>
                </div>

                <div class="w-20 shrink-0">
                  <label class="text-text-secondary text-xs mb-1 block"> Total </label>

                  <div
                    class="bg-overlay border border-border rounded px-2 py-1.5 text-success font-medium text-xs text-center"
                  >
                    R$ {{ item.total.toFixed(2) }}
                  </div>
                </div>

                <div class="shrink-0 mt-4">
                  <button
                    type="button"
                    (click)="removeItem(i)"
                    class="bg-danger hover:opacity-90 text-btn-text p-1.5 rounded transition-all"
                    title="Remover item"
                  >
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <line x1="18" y1="6" x2="6" y2="18"></line>
                      <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Empty -->
          <div
            *ngIf="order.items.length === 0"
            class="text-center py-8 bg-surface-alt rounded-lg border border-border"
          >
            <svg
              class="mx-auto mb-3 text-text-muted"
              width="40"
              height="40"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>

            <p class="text-text-secondary text-sm">Nenhum item no pedido</p>
          </div>
        </div>

        <!-- Total -->
        <div class="bg-surface border border-success/40 rounded-lg p-4">
          <div class="flex justify-between items-center">
            <span class="text-text-primary text-lg font-medium"> Total do Pedido: </span>

            <span class="text-success text-2xl font-bold"> R$ {{ order.total.toFixed(2) }} </span>
          </div>
        </div>

        <!-- Taxa -->
        <div *ngIf="order" class="bg-surface border border-warning/40 rounded-lg p-4 mt-3">
          <div class="flex justify-between items-center gap-4">
            <div class="flex items-center gap-3">
              <div
                (click)="toggleServiceCharge()"
                class="w-10 h-6 rounded-full transition-colors cursor-pointer shrink-0"
                [class.bg-warning]="serviceChargeEnabled"
                [class.bg-overlay]="!serviceChargeEnabled"
              >
                <div
                  class="w-4 h-4 bg-white rounded-full mt-1 transition-transform"
                  [class.translate-x-5]="serviceChargeEnabled"
                  [class.translate-x-1]="!serviceChargeEnabled"
                ></div>
              </div>

              <span class="text-text-primary text-sm font-medium"> Taxa de Serviço </span>
            </div>

            <div class="flex items-center gap-2">
              <span class="text-text-secondary text-sm"> R$ </span>

              <input
                type="number"
                [ngModel]="serviceChargeAmount"
                (ngModelChange)="onServiceChargeInput($event)"
                [ngModelOptions]="{ standalone: true }"
                [disabled]="!serviceChargeEnabled"
                min="0"
                step="0.01"
                class="w-28 bg-overlay border border-border rounded px-2 py-1 text-warning font-bold text-sm text-center focus:outline-none focus:border-accent disabled:opacity-40"
              />
            </div>
          </div>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="bg-overlay px-6 py-4 flex justify-end gap-3 border-t border-border">
      <button
        (click)="closeModal()"
        class="px-6 py-2.5 bg-surface-alt hover:bg-overlay text-text-primary rounded-lg font-medium transition-all"
      >
        Cancelar
      </button>

      <button
        (click)="saveOrder()"
        [disabled]="isSaving || hasInvalidObservations"
        class="px-6 py-2.5 bg-accent hover:bg-accent-hover text-btn-text rounded-lg font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
      >
        <svg
          *ngIf="isSaving"
          class="animate-spin"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
        </svg>

        {{ isSaving ? 'Salvando...' : 'Salvar Alterações' }}
      </button>
    </div>
  </div>
</ng-template>
