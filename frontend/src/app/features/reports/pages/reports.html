<div class="min-h-screen flex flex-col items-center justify-start bg-base px-4 py-6">
  <!-- Botão fixo -->
  <button
    (click)="goToMenu()"
    class="self-center mb-6 bg-accent hover:bg-accent-hover text-white px-6 py-2 rounded transition cursor-pointer font-semibold"
  >
    Voltar para menu
  </button>

  <!-- Container -->
  <div class="w-full max-w-[95%] 2xl:max-w-400 bg-surface rounded-2xl p-6">
    <div class="flex items-center justify-between mb-6 border-b border-border pb-4">
      <div class="flex flex-wrap gap-4">
        <button
          (click)="changeMenuContext('report-sales')"
          [attr.class]="menuContext === 'report-sales' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-chart-line"></i> Relatório de Vendas
        </button>
        <button
          (click)="changeMenuContext('report-products')"
          [attr.class]="menuContext === 'report-products' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-box"></i> Relatório de Produtos
        </button>
        <button
          (click)="changeMenuContext('reports-expenses')"
          [attr.class]="menuContext === 'reports-expenses' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-receipt"></i> Relatório de Despesas
        </button>
        <button
          (click)="changeMenuContext('reports-orders')"
          [attr.class]="menuContext === 'reports-orders' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-clipboard-list"></i> Relatório de Comandas
        </button>
        <button
          (click)="changeMenuContext('reports-locations')"
          [attr.class]="menuContext === 'reports-locations' ? classBtnSelected : classBtnUnselected"
        >
          <i class="fas fa-map-marker-alt"></i> Relatório de Locais
        </button>
      </div>
    </div>

    @if (menuContext === 'report-sales') {
      <app-report-sales />
    } @else if (menuContext === 'report-products') {
      <app-report-products />
    } @else if (menuContext === 'reports-expenses') {
      <app-reports-expenses />
    } @else if (menuContext === 'reports-orders') {
      <app-report-orders />
    } @else if (menuContext === 'reports-locations') {
      <app-report-locations />
    }
  </div>
</div>
