<div class="p-6">
  <!-- Filtros -->
  <div class="mb-6">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
      <div class="md:col-span-5">
        <label for="filterName" class="block text-sm font-medium text-gray-300 mb-2">
          Filtrar por Nome
        </label>
        <input 
          type="text" 
          class="w-full px-4 py-2 bg-gray-800 text-white border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent placeholder-gray-400" 
          id="filterName"
          [(ngModel)]="filterName"
          placeholder="Digite o nome do cliente"
          (keyup.enter)="applyFilters()"
        />
      </div>
      <div class="md:col-span-3">
        <label for="filterStatus" class="block text-sm font-medium text-gray-300 mb-2">
          Status
        </label>
        <select 
          class="w-full px-4 py-2 bg-gray-800 text-white border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent" 
          id="filterStatus"
          [(ngModel)]="filterStatus"
        >
          <option value="all">Todos</option>
          <option value="active">Ativos</option>
          <option value="inactive">Inativos</option>
        </select>
      </div>
      <div class="md:col-span-4 flex gap-3">
        <button 
          class="flex-1 px-6 py-2 bg-cyan-500 hover:bg-cyan-600 text-white font-medium rounded-lg transition-colors duration-200" 
          (click)="applyFilters()"
        >
          Filtrar
        </button>
        <button 
          class="flex-1 px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-lg transition-colors duration-200" 
          (click)="clearFilters()"
        >
          Limpar
        </button>
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="overflow-x-auto rounded-lg border border-gray-700">
    <table class="w-full text-left">
      <thead class="bg-gray-800">
        <tr>
          <th class="px-6 py-3 text-cyan-400 font-semibold text-sm uppercase tracking-wider">ID</th>
          <th class="px-6 py-3 text-cyan-400 font-semibold text-sm uppercase tracking-wider">Nome</th>
          <th class="px-6 py-3 text-cyan-400 font-semibold text-sm uppercase tracking-wider">Telefone</th>
          <th class="px-6 py-3 text-cyan-400 font-semibold text-sm uppercase tracking-wider">Endereço</th>
          <th class="px-6 py-3 text-cyan-400 font-semibold text-sm uppercase tracking-wider">Status</th>
          <th class="px-6 py-3 text-cyan-400 font-semibold text-sm uppercase tracking-wider">Ações</th>
        </tr>
      </thead>
      <tbody class="bg-gray-900 divide-y divide-gray-700">
        @for (client of listClients; track client.id) {
          <tr class="hover:bg-gray-800 transition-colors duration-150">
            <td class="px-6 py-4 text-gray-300">{{ client.id }}</td>
            <td class="px-6 py-4 text-gray-300">{{ client.name }}</td>
            <td class="px-6 py-4 text-gray-300">{{ client.phone }}</td>
            <td class="px-6 py-4 text-gray-300">{{ client.address }}</td>
            <td class="px-6 py-4">
              <span 
                class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium"
                [class.bg-green-500]="client.active" 
                [class.text-white]="client.active"
                [class.bg-red-500]="!client.active"
                [class.text-white]="!client.active"
              >
                {{ client.active ? 'Ativo' : 'Inativo' }}
              </span>
            </td>
            <td class="px-6 py-4">
              @if (client.id !== 1) {
                <div class="flex gap-2">
                  <button 
                    class="px-4 py-1.5 bg-yellow-500 hover:bg-yellow-600 text-white text-sm font-medium rounded transition-colors duration-200" 
                    (click)="openModalEdit(client)"
                  >
                    Editar
                  </button>
                  <button 
                    class="px-4 py-1.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded transition-colors duration-200" 
                    (click)="deleteClient(client)"
                  >
                    Excluir
                  </button>
                </div>
              }
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <!-- Paginação -->
  <div class="mt-6">
    <app-paginator
      [totalItems]="totalItems"
      [itemsPerPage]="limit"
      [totalPages]="totalPages"
      [page]="page"
      (pageChanged)="getClients($event, limit)"
    ></app-paginator>
  </div>
</div>

<!-- Modal -->
<app-modal-edit-entity
  [title]="'Editar Cliente'"
  [show]="showModalEdit"
  [entity]="editClient"
  [fields]="clientFields"
  (close)="closeModalEdit()"
  (save)="onSaveModal($event)"
></app-modal-edit-entity>
