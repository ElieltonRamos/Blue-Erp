<div class="p-6">
  <!-- Filtros -->
  <div class="mb-6">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
      <div class="md:col-span-5">
        <label for="filterName" class="block text-sm font-medium text-text-secondary mb-2">
          Filtrar por Nome
        </label>
        <input
          type="text"
          class="w-full px-4 py-2 bg-surface-alt text-text-primary border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent placeholder:text-text-muted"
          id="filterName"
          [(ngModel)]="filterName"
          placeholder="Digite o nome do cliente"
          (keyup.enter)="applyFilters()"
        />
      </div>
      <div class="md:col-span-3">
        <label for="filterStatus" class="block text-sm font-medium text-text-secondary mb-2">
          Status
        </label>
        <select
          class="w-full px-4 py-2 bg-surface-alt text-text-primary border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent"
          id="filterStatus"
          [(ngModel)]="filterStatus"
        >
          <option value="all">Todos</option>
          <option value="active">Ativos</option>
          <option value="inactive">Inativos</option>
        </select>
      </div>
      <div class="md:col-span-4 flex gap-3">
        <button
          class="flex-1 px-6 py-2 bg-accent hover:bg-accent-hover text-btn-text font-medium rounded-lg transition-colors duration-200"
          (click)="applyFilters()"
        >
          Filtrar
        </button>
        <button
          class="flex-1 px-6 py-2 bg-overlay hover:bg-surface-alt text-text-primary font-medium rounded-lg transition-colors duration-200"
          (click)="clearFilters()"
        >
          Limpar
        </button>
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="overflow-x-auto rounded-lg border border-border">
    <table class="w-full text-left">
      <thead class="bg-surface-alt">
        <tr>
          <th class="px-6 py-3 text-text-secondary font-semibold text-sm uppercase tracking-wider">
            ID
          </th>
          <th class="px-6 py-3 text-text-secondary font-semibold text-sm uppercase tracking-wider">
            Nome
          </th>
          <th class="px-6 py-3 text-text-secondary font-semibold text-sm uppercase tracking-wider">
            Telefone
          </th>
          <th class="px-6 py-3 text-text-secondary font-semibold text-sm uppercase tracking-wider">
            Endereço
          </th>
          <th class="px-6 py-3 text-text-secondary font-semibold text-sm uppercase tracking-wider">
            Status
          </th>
          <th class="px-6 py-3 text-text-secondary font-semibold text-sm uppercase tracking-wider">
            Ações
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-border">
        @for (client of listClients; track client.id; let even = $even) {
          <tr
            [class]="even ? 'bg-surface hover:bg-surface-alt' : 'bg-overlay hover:bg-surface-alt'"
            class="transition-colors duration-150"
          >
            <td class="px-6 py-4 text-text-secondary">{{ client.id }}</td>
            <td class="px-6 py-4 text-text-primary">{{ client.name }}</td>
            <td class="px-6 py-4 text-text-secondary">{{ client.phone }}</td>
            <td class="px-6 py-4 text-text-secondary">{{ client.address }}</td>
            <td class="px-6 py-4">
              <span
                class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium text-text-primary"
                [class.bg-success]="client.active"
                [class.bg-danger]="!client.active"
              >
                {{ client.active ? 'Ativo' : 'Inativo' }}
              </span>
            </td>
            <td class="px-6 py-4">
              @if (client.id !== 1) {
                <div class="flex gap-2">
                  <button
                    class="action-btn bg-btn-edit hover:bg-btn-edit/80"
                    (click)="openModalEdit(client)"
                  >
                    Editar
                  </button>
                  <button
                    class="action-btn bg-btn-delete hover:bg-btn-delete/80"
                    (click)="deleteClient(client)"
                  >
                    Excluir
                  </button>
                </div>
              }
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <!-- Paginação -->
  <div class="mt-6">
    <app-paginator
      [totalItems]="totalItems"
      [itemsPerPage]="limit"
      [totalPages]="totalPages"
      [page]="page"
      (pageChanged)="getClients($event, limit)"
    ></app-paginator>
  </div>
</div>

<!-- Modal -->
<app-modal-edit-entity
  [title]="'Editar Cliente'"
  [show]="showModalEdit"
  [entity]="editClient"
  [fields]="clientFields"
  (close)="closeModalEdit()"
  (save)="onSaveModal($event)"
></app-modal-edit-entity>
