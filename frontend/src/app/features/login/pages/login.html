<main class="bg-base min-h-screen w-screen flex items-center justify-center p-4">
  <!-- Botão de tema -->
  <button
    (click)="themeService.toggle()"
    class="absolute top-4 right-4 bg-surface border border-border text-text-secondary hover:text-text-primary rounded-md px-3 py-1.5 text-sm transition-colors"
  >
    {{ themeService.theme() === 'dark' ? '☀️ Claro' : '🌙 Escuro' }}
  </button>
  <div class="flex flex-col md:flex-row rounded-md w-full max-w-3xl overflow-hidden gap-3">
    <div class="w-full md:w-1/2 max-h-80 md:max-h-full">
      <img src="blue-erp.png" alt="Logo Blue PDV" class="rounded-2xl w-full h-full object-cover" />
    </div>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="bg-surface p-4 w-full md:w-1/2 rounded-b-md md:rounded-r-md md:rounded-bl-none flex justify-center items-center flex-col"
    >
      <h1 class="text-text-primary font-bold text-2xl md:text-3xl mb-4 text-center">
        Bem Vindo ao Blue ERP
      </h1>
      <input
        type="text"
        placeholder="Usuário"
        formControlName="username"
        class="bg-surface-alt border border-border text-text-primary placeholder:text-text-muted rounded-sm w-full h-12 mt-2 pl-2 focus:outline-none focus:border-accent"
      />
      @if (form.get('username')?.touched && form.get('username')?.invalid) {
        <p class="text-sm text-danger mt-1 self-start">O usuário é inválido</p>
      }
      <input
        type="password"
        placeholder="Senha"
        formControlName="password"
        class="bg-surface-alt border border-border text-text-primary placeholder:text-text-muted rounded-sm w-full h-12 mt-2 pl-2 focus:outline-none focus:border-accent"
      />
      @if (form.get('password')?.touched && form.get('password')?.invalid) {
        <p class="text-sm text-danger mt-1 self-start">Digite sua senha</p>
      }
      <button
        type="submit"
        class="h-12 w-full bg-accent hover:bg-accent-hover rounded-md text-text-primary cursor-pointer mt-4 transition-colors"
      >
        Entrar
      </button>
      <p class="text-text-muted text-xs mt-3">Versão {{ version }}</p>
    </form>
  </div>
</main>
